<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EmesGPT — The AI With Soul</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
:root {
--navy-950: #0a1224;
--navy-900: #0f1b34;
--navy-800: #16274a;
--navy-700: #1f335c;
--gold: #c9a84c;
--gold-bright: #e0be63;
--text: #eef1f6;
--muted: #93a1bd;
--error: #e07a6d;
}
* { box-sizing: border-box; }
html, body {
height: 100%;
margin: 0;
}
body {
background: var(--navy-950);
background-image: radial-gradient(circle at 50% 0%, var(--navy-900), var(--navy-950) 60%);
color: var(--text);
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
display: flex;
flex-direction: column;
height: 100vh;
overflow: hidden;
}
header {
padding: 18px 24px 14px;
text-align: center;
border-bottom: 1px solid var(--navy-700);
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
position: relative;
}
header .titleblock { text-align: center; }
header .mark {
font-size: 12px;
letter-spacing: 0.3em;
color: var(--gold);
text-transform: uppercase;
margin-bottom: 4px;
}
header h1 {
margin: 0;
font-size: 22px;
font-weight: 700;
color: var(--text);
}
header h1 span { color: var(--gold-bright); }
.header-actions {
position: absolute;
right: 24px;
top: 50%;
transform: translateY(-50%);
display: flex;
gap: 8px;
}
.header-actions button, .header-actions a {
background: transparent;
color: var(--muted);
border: 1px solid var(--navy-700);
border-radius: 8px;
padding: 8px 14px;
font-size: 13px;
cursor: pointer;
text-decoration: none;
display: inline-block;
}
.header-actions button:hover, .header-actions a:hover { color: var(--gold-bright); border-color: var(--gold); }

main {
flex: 1;
min-height: 0;
max-width: 780px;
width: 100%;
margin: 0 auto;
display: flex;
flex-direction: column;
padding: 0 24px;
}

#chat-scroll {
flex: 1;
min-height: 0;
overflow-y: auto;
padding: 20px 4px 12px;
display: flex;
flex-direction: column;
gap: 16px;
}
.empty-state {
margin: auto;
text-align: center;
color: var(--muted);
font-size: 14px;
max-width: 520px;
}
.empty-state .mark-lg {
font-size: 40px;
font-weight: 700;
letter-spacing: 0.08em;
color: var(--gold);
text-transform: uppercase;
margin-bottom: 16px;
line-height: 1.25;
}

.msg { display: flex; flex-direction: column; max-width: 88%; }
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.assistant { align-self: flex-start; align-items: flex-start; }
.bubble {
border-radius: 12px;
padding: 12px 16px;
font-size: 15px;
line-height: 1.6;
}
.msg.user .bubble {
background: var(--navy-700);
color: var(--text);
border-bottom-right-radius: 3px;
white-space: pre-wrap;
}
.msg.assistant .bubble {
background: var(--navy-900);
border: 1px solid var(--navy-700);
border-bottom-left-radius: 3px;
}
.msg .meta {
font-size: 11px;
color: var(--muted);
margin-top: 4px;
font-style: italic;
}
.msg.dimmed .bubble { opacity: 0.5; }

.window-divider {
display: flex;
align-items: center;
gap: 10px;
color: var(--muted);
font-size: 11px;
text-transform: uppercase;
letter-spacing: 0.06em;
margin: 2px 0;
}
.window-divider::before, .window-divider::after {
content: '';
flex: 1;
height: 1px;
background: var(--navy-700);
}

.bubble h1, .bubble h2, .bubble h3 {
color: var(--gold-bright);
margin: 14px 0 6px;
font-size: 16px;
border-bottom: 1px solid var(--navy-700);
padding-bottom: 4px;
}
.bubble h1:first-child, .bubble h2:first-child, .bubble h3:first-child { margin-top: 0; }
.bubble p { margin: 0 0 10px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble ul, .bubble ol { margin: 0 0 10px; padding-left: 20px; }
.bubble li { margin-bottom: 4px; }
.bubble strong { color: var(--gold-bright); }
.bubble blockquote {
border-left: 3px solid var(--gold);
margin: 10px 0;
padding: 2px 14px;
color: var(--muted);
font-style: italic;
}

.typing-dots { display: inline-flex; gap: 4px; padding: 4px 0; }
.typing-dots span {
width: 6px; height: 6px; border-radius: 50%;
background: var(--muted);
animation: bounce 1.2s infinite ease-in-out;
}
.typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.typing-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-4px); opacity: 1; } }

#status {
font-size: 12px;
color: var(--error);
min-height: 16px;
padding: 0 4px 6px;
flex-shrink: 0;
}

#usage-bar {
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: space-between;
gap: 10px;
padding: 6px 10px;
margin: 0 4px 8px;
border: 1px solid var(--navy-700);
border-radius: 8px;
font-size: 12px;
color: var(--muted);
background: var(--navy-900);
}
#usage-bar.limit-reached {
border-color: var(--error);
color: var(--error);
background: rgba(224, 122, 109, 0.08);
}
#usage-reset-btn {
background: transparent;
color: var(--muted);
border: 1px solid var(--navy-700);
border-radius: 6px;
padding: 4px 10px;
font-size: 11px;
cursor: pointer;
flex-shrink: 0;
}
#usage-reset-btn:hover { color: var(--gold-bright); border-color: var(--gold); }
#usage-bar.limit-reached #usage-reset-btn {
color: var(--navy-950);
background: linear-gradient(180deg, var(--gold-bright), var(--gold));
border: none;
font-weight: 700;
}

#composer {
flex-shrink: 0;
padding: 12px 4px 18px;
border-top: 1px solid var(--navy-700);
}
.composer-row {
display: flex;
align-items: flex-end;
gap: 10px;
background: var(--navy-900);
border: 1px solid var(--navy-700);
border-radius: 12px;
padding: 8px 8px 8px 14px;
}
#input-text {
flex: 1;
resize: none;
background: transparent;
color: var(--text);
border: none;
outline: none;
font-size: 15px;
font-family: inherit;
line-height: 1.5;
max-height: 160px;
padding: 6px 0;
}
#input-text::placeholder { color: #5b6884; }
#send-btn {
background: linear-gradient(180deg, var(--gold-bright), var(--gold));
color: var(--navy-950);
border: none;
border-radius: 9px;
padding: 10px 18px;
font-weight: 700;
font-size: 14px;
cursor: pointer;
display: inline-flex;
align-items: center;
gap: 8px;
flex-shrink: 0;
}
#send-btn:hover { filter: brightness(1.08); }
#send-btn:disabled { background: #6b6042; color: #a8a8a8; cursor: not-allowed; }
.spinner {
width: 13px; height: 13px;
border: 2px solid rgba(10,18,36,0.35);
border-top-color: var(--navy-950);
border-radius: 50%;
animation: spin 0.7s linear infinite;
display: none;
}
.spinner.active { display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

.composer-meta {
display: flex;
justify-content: space-between;
padding: 6px 6px 0;
font-size: 11px;
color: var(--muted);
}
#char-count.warn { color: var(--gold-bright); }
#char-count.over { color: var(--error); font-weight: 600; }
</style>
</head>
<body>
<header>
<div class="titleblock">
<div class="mark">אמת &nbsp;·&nbsp; EMES</div>
<h1>Emes<span>GPT</span></h1>
</div>
<div class="header-actions">
<button id="export-btn" type="button">Export</button>
<button id="clear-btn" type="button">Clear history</button>
</div>
</header>

<main>
<div id="chat-scroll">
<div class="empty-state" id="empty-state">
<div class="mark-lg">The AI With Soul</div>
Ask your deepest questions. This is a running conversation, and
EmesGPT remembers what's already been said.
</div>
</div>

<div id="status"></div>

<div id="usage-bar">
<span id="usage-text">Loading usage…</span>
<button id="usage-reset-btn" type="button">Reset limit</button>
</div>

<div id="composer">
<div class="composer-row">
<textarea id="input-text" rows="1" placeholder="Ask your deepest questions..."></textarea>
<button id="send-btn" type="button">
<span class="spinner" id="spinner"></span>
<span id="send-label">Send</span>
</button>
</div>
<div class="composer-meta">
<span id="window-hint">Shift+Enter for a new line</span>
<span id="char-count">0 chars</span>
</div>
</div>
</main>

<script>
const chatScroll = document.getElementById('chat-scroll');
const emptyState = document.getElementById('empty-state');
const statusEl = document.getElementById('status');
const inputText = document.getElementById('input-text');
const sendBtn = document.getElementById('send-btn');
const sendLabel = document.getElementById('send-label');
const spinner = document.getElementById('spinner');
const charCountEl = document.getElementById('char-count');
const windowHintEl = document.getElementById('window-hint');
const clearBtn = document.getElementById('clear-btn');
const exportBtn = document.getElementById('export-btn');
const usageBarEl = document.getElementById('usage-bar');
const usageTextEl = document.getElementById('usage-text');
const usageResetBtn = document.getElementById('usage-reset-btn');

const WARN_CHARS = 12000;
const MAX_CHARS = 50000;
const DEFAULT_PLACEHOLDER = inputText.placeholder;

// Server-side hard cap on Groq calls for this run of the server (see
// MESSAGE_LIMIT in app.py). Mirrored here just for display / to avoid a
// wasted round trip once we already know we're at the cap — the backend is
// the actual enforcement point.
let usage = { used: 0, limit: 10, remaining: 10 };

function renderUsage() {
usageTextEl.textContent = `${usage.used} / ${usage.limit} messages used this session`;
const reached = usage.remaining <= 0;
usageBarEl.classList.toggle('limit-reached', reached);
inputText.disabled = reached;
sendBtn.disabled = reached;
inputText.placeholder = reached
? "You've reached the message limit for this session — click Reset limit to continue."
: DEFAULT_PLACEHOLDER;
}

async function refreshUsage() {
try {
const res = await fetch('/api/usage');
usage = await res.json();
} catch {
// If this fails the backend will still enforce the cap on the next send;
// we just won't show an accurate count until it's reachable again.
}
renderUsage();
}

usageResetBtn.addEventListener('click', async () => {
usageResetBtn.disabled = true;
try {
const res = await fetch('/api/usage/reset', { method: 'POST' });
usage = await res.json();
renderUsage();
setStatus('Message limit reset.');
} catch (err) {
setStatus('Could not reset the limit — try again.');
} finally {
usageResetBtn.disabled = false;
}
});

refreshUsage();

// Only the last CONTEXT_WINDOW messages are sent to the API on each turn —
// keeps token usage (and cost) roughly constant regardless of how long the
// conversation gets. The FULL conversation is still kept and shown locally;
// only what's sent to Groq is trimmed. Tune this between 5-10 x 2 to
// taste (it counts individual messages, not exchanges).
const CONTEXT_WINDOW = 10;

const STORAGE_KEY = 'emesgpt_conversation_v1';

// Each entry: { role: 'user'|'assistant', content: string, meta?: string }
let conversation = loadConversation();

function loadConversation() {
try {
const raw = localStorage.getItem(STORAGE_KEY);
if (!raw) return [];
const parsed = JSON.parse(raw);
return Array.isArray(parsed) ? parsed : [];
} catch {
return [];
}
}

function saveConversation() {
try {
localStorage.setItem(STORAGE_KEY, JSON.stringify(conversation));
} catch {
// localStorage full or unavailable (e.g. private browsing) — conversation
// still works for the session, it just won't survive a reload.
}
}

function setStatus(msg) {
statusEl.textContent = msg || '';
}

function scrollToBottom() {
chatScroll.scrollTop = chatScroll.scrollHeight;
}

function renderMessage(role, content, meta, dimmed) {
const wrap = document.createElement('div');
wrap.className = `msg ${role}` + (dimmed ? ' dimmed' : '');
const bubble = document.createElement('div');
bubble.className = 'bubble';
if (role === 'assistant') {
bubble.innerHTML = marked.parse(content);
} else {
bubble.textContent = content;
}
wrap.appendChild(bubble);
if (meta) {
const metaEl = document.createElement('div');
metaEl.className = 'meta';
metaEl.textContent = meta;
wrap.appendChild(metaEl);
}
chatScroll.appendChild(wrap);
return wrap;
}

function renderDivider() {
const div = document.createElement('div');
div.className = 'window-divider';
div.textContent = `Only the last ${CONTEXT_WINDOW} messages below are sent to EmesGPT`;
chatScroll.appendChild(div);
}

// Full re-render: needed because the context-window boundary (and which
// messages are dimmed) shifts every time a new message is added.
function renderAll() {
chatScroll.innerHTML = '';
if (conversation.length === 0) {
chatScroll.appendChild(emptyState);
emptyState.style.display = 'block';
windowHintEl.textContent = 'Shift+Enter for a new line';
return;
}
emptyState.style.display = 'none';
const cutoff = Math.max(0, conversation.length - CONTEXT_WINDOW);
conversation.forEach((msg, i) => {
if (i === cutoff && cutoff > 0) renderDivider();
renderMessage(msg.role, msg.content, msg.meta || null, i < cutoff);
});
windowHintEl.textContent = conversation.length > CONTEXT_WINDOW
? `Shift+Enter for a new line · only last ${CONTEXT_WINDOW} messages sent as context`
: 'Shift+Enter for a new line';
scrollToBottom();
}

function renderTyping() {
const wrap = document.createElement('div');
wrap.className = 'msg assistant';
wrap.id = 'typing-indicator';
const bubble = document.createElement('div');
bubble.className = 'bubble';
bubble.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span>';
wrap.appendChild(bubble);
chatScroll.appendChild(wrap);
scrollToBottom();
}

function removeTyping() {
const el = document.getElementById('typing-indicator');
if (el) el.remove();
}

function updateCharCount() {
const len = inputText.value.length;
charCountEl.textContent = `${len.toLocaleString()} / ${MAX_CHARS.toLocaleString()} chars`;
charCountEl.className = len > MAX_CHARS ? 'over' : (len > WARN_CHARS ? 'warn' : '');
}
inputText.addEventListener('input', () => {
updateCharCount();
inputText.style.height = 'auto';
inputText.style.height = Math.min(inputText.scrollHeight, 160) + 'px';
});
updateCharCount();

inputText.addEventListener('keydown', (e) => {
if (e.key === 'Enter' && !e.shiftKey) {
e.preventDefault();
sendMessage();
}
});

function setLoading(isLoading) {
sendBtn.disabled = isLoading;
spinner.classList.toggle('active', isLoading);
sendLabel.textContent = isLoading ? 'Sending…' : 'Send';
}

clearBtn.addEventListener('click', () => {
if (conversation.length && !confirm('Clear the whole conversation? This cannot be undone.')) return;
conversation = [];
saveConversation();
renderAll();
setStatus('');
inputText.value = '';
updateCharCount();
});

exportBtn.addEventListener('click', () => {
if (!conversation.length) { setStatus('Nothing to export yet.'); return; }
const stamp = new Date().toISOString().replace(/[:.]/g, '-');
const lines = [`EmesGPT conversation — exported ${new Date().toLocaleString()}`, ''];
conversation.forEach((m) => {
lines.push(m.role === 'user' ? 'You:' : 'EmesGPT:');
lines.push(m.content);
lines.push('');
});
const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = `emesgpt-conversation-${stamp}.txt`;
document.body.appendChild(a);
a.click();
a.remove();
URL.revokeObjectURL(url);
});

sendBtn.addEventListener('click', sendMessage);

async function sendMessage() {
const text = inputText.value.trim();
if (!text) { setStatus('Type something or paste a link first.'); return; }
if (text.length > MAX_CHARS) {
setStatus(`That's ${text.length.toLocaleString()} characters — trim it below ${MAX_CHARS.toLocaleString()} and try again.`);
return;
}
if (usage.remaining <= 0) {
setStatus(`You've reached the ${usage.limit}-message limit for this session. Click Reset limit to continue.`);
return;
}

conversation.push({ role: 'user', content: text });
saveConversation();
renderAll();
inputText.value = '';
inputText.style.height = 'auto';
updateCharCount();
setStatus('');
setLoading(true);
renderTyping();

// Cost control: only send the last CONTEXT_WINDOW messages as context,
// not the full history. The full history stays local (localStorage) and
// visible in the UI regardless.
const windowed = conversation.slice(-CONTEXT_WINDOW);

try {
const res = await fetch('/api/chat', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ messages: windowed.map(({ role, content }) => ({ role, content })) }),
});
const data = await res.json();
removeTyping();
if (!res.ok) {
// Don't keep a user turn in history that the server rejected/couldn't answer.
conversation.pop();
saveConversation();
renderAll();
if (data.usage) { usage = data.usage; renderUsage(); }
throw new Error(data.error || 'Something went wrong.');
}
conversation.push({ role: 'assistant', content: data.reply, meta: data.source_note || null });
saveConversation();
renderAll();
if (data.usage) { usage = data.usage; renderUsage(); }
} catch (err) {
setStatus(err.message);
} finally {
setLoading(false);
if (usage.remaining <= 0) renderUsage(); // keep send disabled even after setLoading re-enables it
}
}

renderAll();
</script>
</body>
</html>
